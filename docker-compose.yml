services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: career-postgres
    environment:
      POSTGRES_DB: job_recommendation_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_recommendation_system"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26
    container_name: career-neo4j
    environment:
      NEO4J_AUTH: neo4j/abcd@1234
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p abcd@1234 \"RETURN 1\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: career-api
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - ./configs/db/postgres.docker.yaml:/app/configs/db/postgres.yaml:ro
      - ./configs/db/neo4j.docker.yaml:/app/configs/db/neo4j.yaml:ro
    working_dir: /app
    command: >
      python -m uvicorn apps.api.app.server:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
